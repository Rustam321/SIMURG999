# Netlify deploy config — static site, no build step.
# Publishes the site from the simurg999/ subfolder.
[build]
  publish = "simurg999"
  command = ""

# Long cache for static assets (images/css/js); HTML stays fresh.
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
